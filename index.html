<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>请稍候</title>
</head>

<body>
    <h1>请稍候</h1>
    <p>正在跳转···</p>
    <p>
        如果没有发生跳转，请点击
        <a href="index.html">这里</a>
    </p>
    <div id="rrr"></div>
    <script>
        var b = document.getElementById("rrr");
        function aaa() {
            setTimeout(function () {
                var ap = document.createElement('a');
                ap.href = "phone.html";
                ap.textContent = "手机请点这里";
                var ac = document.createElement('a');
                ac.href = "computer.html";
                ac.textContent = "电脑请点这里";
                var p = document.createElement('p');
                p.textContent = "呃好吧看来是出大问题了，只能拿出我的焚诀了！";

                b.appendChild(document.createElement('br'));
                b.appendChild(document.createElement('br'));
                b.appendChild(document.createElement('br'));
                b.appendChild(p);
                b.appendChild(ap);
                b.appendChild(document.createElement('br'));
                b.appendChild(ac);
            }, 5000);
        }

        window.addEventListener('load', function () {
            const phone = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);
            aaa();
            console.log(
                "       _._     _,-'\"\"`-._\n" +
                "      (,-.`._,'(       |\\`-/|\n" +
                "          `-.-' \\ )-`( , o o)\n" +
                "                `-    \\`_`\"'-\n" +
                "  ╱|、\n" +
                " (˚ˎ 。7  \n" +
                "  |、˜〵          \n" +
                "  じしˍ,)ノ   \n" +
                "                    /\\_/\\\n" +
                "                   ( ^.^ )\n" +
                "                   (  )_(  )\n" +
                "恭喜你发现彩蛋"
            );

            if (phone) {
                window.location.href = "phone.html"; 
            } else {
                window.location.href = "computer.html"; 
            }
        })();
    </script>
</body>

</html>
